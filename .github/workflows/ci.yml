name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  quality:
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Black
        run: black --check main.py test_main.py benchmark.py backup_workspace.py

      - name: Flake8
        run: flake8 --max-line-length=88 --extend-ignore=E203,E501 main.py test_main.py benchmark.py backup_workspace.py

      - name: Pylint
        run: pylint main.py test_main.py benchmark.py backup_workspace.py

      - name: Mypy
        run: mypy main.py test_main.py benchmark.py backup_workspace.py

      - name: Pytest
        run: pytest test_main.py -v

      - name: Benchmark smoke
        run: python benchmark.py --iterations 1000
