name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  quality:
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r requirements-dev.txt

      - name: Black
        run: black --check src/rcal tests scripts

      - name: Flake8
        run: flake8 --max-line-length=88 --extend-ignore=E203,E501 src/rcal tests scripts

      - name: Pylint
        run: pylint src/rcal tests scripts

      - name: Mypy
        run: mypy src/rcal tests scripts

      - name: Pytest
        run: pytest tests -v

      - name: Benchmark smoke
        run: python scripts/benchmark.py --iterations 1000
